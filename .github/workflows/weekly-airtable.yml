name: weekly-airtable-progress

# 매주 목요일 13:00 KST (= 04:00 UTC) 에어테이블에서 두 종류의 CSV를 갱신한다:
#   1. 진행현황·매출결산 — CSV/progress_YYYY_WNN.csv / project_YYYY_WNN.csv
#      (주차별 신규 파일, fetch_airtable_weekly.mjs)
#   2. 발주/이슈/협력사 등 고정 파일명 CSV — CSV/order.csv 등을 그 자리에서
#      갱신(AIRTABLE_SOURCES 변수로 설정된 항목만, fetch_airtable_sources.mjs)
#      — 덮어쓰기 전 이전 버전을 CSV_BANK로 자동 아카이브(협력사는 월간 스냅샷도)
# 수동 실행(workflow_dispatch)도 가능 — 대시보드의 "지금 새로고침" 버튼도
# 이 워크플로를 GitHub API로 직접 트리거한다(§9 참고).
on:
  schedule:
    - cron: '0 4 * * 4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-airtable
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — fetch_airtable_sources.mjs가 `git log -1 -- <file>`로 각 CSV의
      # 마지막 커밋 날짜를 구해 아카이브 주차를 정하는데, 얕은 체크아웃(depth 1)에서는
      # 모든 파일이 HEAD 커밋 날짜로 나와 CSV_BANK 주차 라벨이 어긋난다 (v22.2 감사 수정)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch 진행현황/매출결산 (주차별 신규 파일)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
          PROGRESS_TABLE: ${{ vars.PROGRESS_TABLE }}
          PROGRESS_VIEW: ${{ vars.PROGRESS_VIEW }}
          PROJECT_TABLE: ${{ vars.PROJECT_TABLE }}
          PROJECT_VIEW: ${{ vars.PROJECT_VIEW }}
        run: node scripts/fetch_airtable_weekly.mjs

      - name: Fetch 발주/이슈/협력사 등 (고정 파일명 CSV)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_SOURCES: ${{ vars.AIRTABLE_SOURCES }}
        run: node scripts/fetch_airtable_sources.mjs

      - name: Update parts price history (단가 변경 에폭 추가)
        run: node scripts/update_price_history.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "airtable-bot"
          git config user.email "actions@github.com"
          git add CSV/ CSV_BANK/ data/parts_price_history.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            WK=$(TZ=Asia/Seoul date +%G-W%V)
            git commit -m "chore: 주간 Airtable CSV 자동 커밋 ($WK)"
            git pull --rebase origin main
            git push origin main
          fi
