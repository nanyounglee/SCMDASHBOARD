name: airtable-discover

# 읽기 전용 — 접근 가능한 Airtable Base/Table/View 이름과 ID를 워크플로 로그에
# 출력한다. 아무 파일도 커밋하지 않는다. AIRTABLE_SOURCES 변수를 채우기 위해
# 정확한 식별자가 필요할 때 Actions 탭에서 수동으로 실행(Run workflow)한다.
# 토큰에 schema.bases:read 스코프가 없으면 목록(§A)은 안내만 남기고,
# data.records:read 만으로 가능한 검수 데이터 프로브(§B)를 계속 진행한다.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: List accessible bases/tables/views + inspect probe
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_SOURCES: ${{ vars.AIRTABLE_SOURCES }}
        run: node scripts/list_airtable_schema.mjs
